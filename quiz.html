іл»: усе, що ви змінили, уже збережено в останньому коміті."}, {"title": "Дві зони в git status", "question": "Які дві зони одночасно відображає git status згідно з практикою в цьому відео?", "options": [{"text": "Робочу зону (working area / working tree) і staging area", "correct": true}, {"text": "Лише віддалений репозиторій на GitHub і локальну копію .git", "correct": false}, {"text": "Тільки гілки Main і Master без файлів", "correct": false}], "feedback": "git status — головний «дашборд»: він показує, що змінено локально і що вже підготовлено до коміту."}, {"title": "Git з будь-якої папки репозиторію", "question": "Чому в лекції можна виконувати git-команди, перебуваючи в підпапці materials, а не лише в корені my_project?", "options": [{"text": "Git відстежує файли в усьому репозиторії, незалежно від поточної робочої директорії в терміналі", "correct": true}, {"text": "Git Bash автоматично переміщує вас у корінь при кожній команді", "correct": false}, {"text": "Команди працюють лише в підпапці, де був виконаний git init", "correct": false}], "feedback": "Репозиторій — єдине ціле: git status, add і commit коректно бачать зміни з будь-якої вкладеної папки."}, {"title": "git log", "question": "Навіщо в практичній частині використовують git log після серії комітів?", "options": [{"text": "Щоб переглянути історію комітів із унікальними ідентифікаторами (хешами) і повідомленнями", "correct": true}, {"text": "Щоб видалити всі попередні коміти й почати історію заново", "correct": false}, {"text": "Щоб автоматично створити нову гілку для кожного запису в логу", "correct": false}], "feedback": "git log — хронологія версій проекту; кожен запис має ID, за яким можна звернутися до конкретного стану."}, {"title": "git diff", "question": "Що показує звичайна команда git diff у прикладі з відео?", "options": [{"text": "Різницю між робочою директорією та останнім комітом (незбережені зміни)", "correct": true}, {"text": "Різницю між двома віддаленими гілками на GitHub", "correct"  крок після git init і initial commit?", "options": [{"text": "git remote add origin <ssh-url> і далі git push", "correct": true}, {"text": "git clone origin у ту саму папку поверх існуючих файлів", "correct": false}, {"text": "Видалити локальний .git і заново завантажити архів з GitHub", "correct": false}], "feedback": "GitHub пропонує саме цей сценарій: ініціалізувати локально, прив'язати origin до віддаленого URL і штовхнути код. Це перший сценарій «локальний проект → порожній remote»."}, {"title": "Push — роль origin", "question": "Навіщо в команді git remote add origin використовують слово origin?", "options": [{"text": "Це псевдонім віддаленого репозиторію, на який далі посилаються git push і git pull", "correct": true}, {"text": "Це назва гілки за замовчуванням замість main", "correct": false}, {"text": "Це обов'язковий логін адміністратора GitHub", "correct": false}], "feedback": "У демо origin — коротке ім'я для URL test.git. Потім достатньо git push origin main: Git знає, куди саме відправляти зміни."}, {"title": "Push — SSH проти HTTPS", "question": "Чому в курсі для push обрано SSH-URL замість HTTPS?", "options": [{"text": "Після налаштування SSH-ключів не потрібно щоразу вводити пароль при відправці коду", "correct": true}, {"text": "HTTPS не дозволяє push у публічні репозиторії", "correct": false}, {"text": "SSH автоматично створює README і initial commit на GitHub", "correct": false}], "feedback": "Інструктор прямо порівнює: з HTTPS довелось би вводити пароль при кожному push. SSH-пара вже налаштована — тому для демо це зручніший і безпечніший варіант."}, {"title": "Push — перший push", "question": "Що робить перший успішний git push у сценарії з порожнім віддаленим репозиторієм?", "options": [{"text": "Передає локальні коміти та файли на GitHub, синхронізуючи історію", "correct": true}, {"text": "Лише копіює назву гілки, але не передає файли", "correct": false}, {"text": "Автоматично створює pull request і зливає гілки", "correct": false}], "feedback": "Після remote add origin push «штовхає» локальний initial commit і вміст проекту на GitHub. Саме цього й чекали від порожнього test-репозиторію."}, {"title": "Push — git pull після merge PR", "question": "Після merge pull request на GitHub локальна main відстає. Яку команду інструктор використовує, щоб підтягнути оновлення?", "options": [{"text": "git pull", "correct": true}, {"text": "git fetch --delete origin", "correct": false}, {"text": "git checkout -b main", "correct": false}], "feedback": "У відео підкреслено: віддалений репозиторій стає джерелом актуальної версії. git pull затягує зміни з GitHub і поєднує їх із локальною main — зворотна операція до push."}, {"title": "Push — віддалений репозиторій як джерело правди", "question": "Чому після командної роботи важливо регулярно оновлювати локальне середовище?", "options": [{"text": "Віддалений репозиторій може містити злиті зміни інших учасників і бути попереду локальної копії", "correct": true}, {"text": "GitHub автоматично видаляє локальні гілки старші за 7 днів", "correct": false}, {"text": "Локальний репозиторій завжди новіший за віддалений після git init", "correct": false}], "feedback": "Інструктор показує: після PR на GitHub локальна feature/main не містить останніх змін. Без pull ви працюєте з застарілою версією коду."}, {"title": "Push — tracking branches", "question": "Що з'являється локально після підключення віддаленого репозиторію, хоча git branch їх не показує звичайним чином?", "options": [{"text": "Віддалені tracking-гілки (наприклад origin/main), які відображають стан GitHub", "correct": true}, {"text": "Дублікати всіх файлів у папці origin/", "correct": false}, {"text": "Нові SSH-ключі для кожної гілки", "correct": false}], "feedback": "У транскрипті згадано tracking branches: з git branch -a видно не лише локальні гілки, а й віддалені. Спочатку оновлюються вони, потім — ваша робоча гілка."}, {"title": "Push — git pull як fetch + merge", "question": "Як у відео описують суть git pull для гілки main?", "options": [{"text": "Команда одночасно підтягує зміни з віддаленого репозиторію і зливає їх із локальною main", "correct": true}, {"text": "Команда лише показує diff, але не змінює файли", "correct": false}, {"text": "Команда видаляє локальні незакомічені зміни", "correct": false}], "feedback": "pull — «зворотний push»: затягує актуальний код з GitHub і робить merge з вашою main, якщо конфліктів немає. Саме так локальне середовище наздоганяє remote."}, {"title": "Push — перейменування master на main", "question": "GitHub у інструкціях пропонує перейменувати гілку на main. Чому в демо цей крок пропускають?", "options": [{"text": "Локальний репозиторій уже створено з гілкою main, тож додаткове перейменування не потрібне", "correct": true}, {"text": "GitHub забороняє використовувати main у публічних репозиторіях", "correct": false}, {"text": "Команда git branch -m main видаляє історію комітів", "correct": false}], "feedback": "Інструктор зазначає: вони з початку працювали з main, тому крок із master→main з інструкцій GitHub для них зайвий."}, {"title": "Push — практика циклу", "question": "Яку пораду дає інструктор перед переходом до наступної теми?", "options": [{"text": "Кілька разів пройти цикл: змінити локально → push → PR/merge → pull", "correct": true}, {"text": "Використовувати лише GitHub Desktop і не повторювати команди", "correct": false}, {"text": "Більше ніколи не переходити на main після feature-гілок", "correct": false}], "feedback": "Наприкінці уроку пропонується свідомо відпрацювати повний цикл синхронізації — це закріплює push, pull і розуміння того, хто «попереду»: local чи origin."}]}, {"id": "05-02-22_github-Конфлікти", "file": "05-02-22_github-Конфлікти.txt", "timecode": "05:02:22", "label": "github — Конфлікти", "questions": [{"title": "Конфлікти — push нової гілки", "question": "При першому push гілки feature виникає помилка про відсутність upstream. Яке рішення показано у відео?", "options": [{"text": "git push --set-upstream origin h нової гілки", "question": "Після створення feature і commit чому знову потрібен git push --set-upstream origin feature?", "options": [{"text": "Локальна feature ще не пов'язана з жодною гілкою на origin", "correct": true}, {"text": "HTTPS-клонування забороняє push у main", "correct": false}, {"text": "git clone видаляє origin після першого коміту", "correct": false}], "feedback": "Нова локальна гілка не існує на сервері. --set-upstream публікує її і задає tracking — так само, як у уроці про конфлікти."}, {"title": "Clone — HTTPS і авторизація", "question": "Чому при push після HTTPS-клону з'являється вікно входу через браузер?", "options": [{"text": "HTTPS не використовує налаштовану SSH-пару і потребує окремої авторизації GitHub", "correct": true}, {"text": "Браузер потрібен лише для git log", "correct": false}, {"text": "SSH-ключі автоматично блокуються після clone", "correct": false}], "feedback": "У цьому уроці свідомо обрали HTTPS-URL. Тому push запитує логін через браузер, на відміну від SSH-сценарію з попередніх відео."}, {"title": "Clone — fork проти clone", "question": "Чим fork на GitHub відрізняється від git clone за змістом уроку?", "options": [{"text": "Fork створює вашу незалежну копію репозиторію в профілі GitHub; clone копіює репозиторій локально на диск", "correct": true}, {"text": "Fork і clone — це одна й та сама команда в терміналі", "correct": false}, {"text": "Fork завантажує лише README без .git", "correct": false}], "feedback": "Наприкінці узагальнюють опції: fork — копія на сервісі у вашому акаунті, clone — робоча копія на машині для комітів і push."}, {"title": "Clone — замикання циклу", "question": "Як після merge PR локально отримати файл з main, який з'явився на GitHub?", "options": [{"text": "Перейти на main (git checkout main) і виконати git pull", "correct": true}, {"text": "Видалити .git і знову клонувати весь репозиторій", "correct": false}, {"text": "Зробити лише git fetch без checkout", "correct": false}], "feedback": "У демо пі ns": [{"text": "Командний рядок (push/pull/clone), GitHub Desktop, архів, fork і клонування", "correct": true}, {"text": "Лише вебредактор GitHub без локальної копії", "correct": false}, {"text": "Лише електронна пошта для обміну файлами", "correct": false}], "feedback": "У завершальному блоці узагальнюються всі шляхи отримати й синхронізувати код — від zip до повноцінного clone."}, {"title": "Завершення — локальний і віддалений зв'язок", "question": "Що має бути налаштовано перед першим push локального myProject?", "options": [{"text": "Зв'язок локальної системи з GitHub (наприклад, через SSH або HTTPS)", "correct": true}, {"text": "Обов'язковий платний план GitHub Team", "correct": false}, {"text": "Видалення всіх локальних комітів", "correct": false}], "feedback": "Без налаштованого з'єднання push неможливий — це логічне продовження уроків про SSH і remote origin."}, {"title": "Завершення — конфлікти в практиці", "question": "Чому інструктор згадує конфлікти й rebase у фінальній вправі?", "options": [{"text": "Реальна синхронізація часто включає розходження історій — варто вміти їх розв'язувати", "correct": true}, {"text": "Без rebase Git не зберігає файли", "correct": false}, {"text": "Конфлікти виникають лише в навчальних відео", "correct": false}], "feedback": "Навіть проста передача myProject на GitHub може зіткнути вас із відставанням гілок — це нормальний наступний крок після базового push."}, {"title": "Завершення — автономність", "question": "Який підхід до навчання Git підкреслюється в останньому відео блоку?", "options": [{"text": "Самостійна практика після демонстрацій інструктора", "correct": true}, {"text": "Повна залежність від GitHub Desktop", "correct": false}, {"text": "Відмова від експериментів із гілками", "correct": false}], "feedback": "«Спробуйте самостійно» — ключова фраза завершення: інструктор дає карту, але м'язова пам'ять з'являється у вашій власній практиці."}, {"title": "Завершення — що вже є для вправи", "question": "Що вже підготовлено для виконання домашнього завдання з myProject?", "options": [{"text": "Репозиторій у профілі GitHub, куди можна передати напрацювання", "correct": true}, {"text": "Готовий автоматичний CI, який забороняє push", "correct": false}, {"text": "Новий акаунт GitHub Enterprise", "correct": false}], "feedback": "Нагадується: репозиторій у профілі уже створено — лишається відпрацювати ланцюжок локальних комітів → remote."}, {"title": "Завершення — наступні кроки", "question": "Куди запрошує інструктор після завершення курсу?", "options": [{"text": "До подальшого навчання в наступних курсах і відео", "correct": true}, {"text": "До повної відмови від Git на користь хмарних дисків", "correct": false}, {"text": "До видалення всіх локальних репозиторіїв", "correct": false}], "feedback": "Фінал — подяка й запрошення продовжувати шлях: курс закриває базовий цикл, але Git вивчається далі в практиці й наступних матеріалах."}, {"title": "Завершення — суть блоку Git+GitHub", "question": "Яке головне досягнення слухача після цього блоку курсу?", "options": [{"text": "Вміти поєднати локальний Git-робочий процес із віддаленим GitHub і синхронізувати зміни", "correct": true}, {"text": "Знати лише теорію без жодної практики push/pull", "correct": false}, {"text": "Використовувати Git лише як текстовий редактор", "correct": false}], "feedback": "Уся арка курсу — від SSH і push до конфліктів, Desktop і clone — веде до одного: локальна робота + віддалена співпраця в одному workflow."}]}]</script>
  <script>
    const SECTIONS = JSON.parse(document.getElementById("quizData").textContent);
    const state = {
      sectionIdx: 0,
      qIdx: 0,
      mode: "one",
      answered: new Set(),
      correct: new Set()
    };

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function qKey(si, qi) { return si + ":" + qi; }

    function currentQuestions() {
      return SECTIONS[state.sectionIdx]?.questions || [];
    }

    function updateProgress() {
      let total = 0, ans = 0, ok = 0;
      SECTIONS.forEach((s, si) => {
        s.questions.forEach((_, qi) => {
          total++;
          const k = qKey(si, qi);
          if (state.answered.has(k)) ans++;
          if (state.correct.has(k)) ok++;
        });
      });
      document.getElementById("progressBar").style.width = total ? (ok / total * 100) + "%" : "0%";
      document.getElementById("progressText").textContent =
        `Правильно: ${ok} / ${total} · Відповідей: ${ans}`;
      document.querySelectorAll("#secList li").forEach((li, i) => {
        const sec = SECTIONS[i];
        let done = 0;
        sec.questions.forEach((_, qi) => {
          if (state.correct.has(qKey(i, qi))) done++;
        });
        li.classList.toggle("done", done === sec.questions.length && sec.questions.length > 0);
      });
    }

    function buildSidebar() {
      const ul = document.getElementById("secList");
      ul.innerHTML = SECTIONS.map((s, i) =>
        `<li data-i="${i}" class="${i === state.sectionIdx ? "active" : ""}">
          <span>${esc(s.label)}</span>
          <small>${s.questions.length}</small>
        </li>`
      ).join("");
      ul.querySelectorAll("li").forEach(li => {
        li.addEventListener("click", () => {
          state.sectionIdx = +li.dataset.i;
          state.qIdx = 0;
          buildSidebar();
          render();
        });
      });
    }

    function renderQuestionCard(q, si, qi, container) {
      const k = qKey(si, qi);
      const answered = state.answered.has(k);
      const card = document.createElement("div");
      card.className = "q-card";
      card.dataset.qi = qi;
      let optsHtml = q.options.map((o, oi) => {
        let cls = "opt";
        if (answered) {
          if (o.correct) cls += " correct";
          else if (card.dataset.picked === String(oi)) cls += " wrong";
        }
        return `<button type="button" class="${cls}" data-oi="${oi}" ${answered ? "disabled" : ""}>${esc(o.text)}</button>`;
      }).join("");
      card.innerHTML = `
        <div class="q-title">${esc(q.title)}</div>
        <div class="q-text">${esc(q.question)}</div>
        <div class="opts">${q.options.map((o, oi) =>
          `<button type="button" class="opt" data-oi="${oi}">${esc(o.text)}</button>`
        ).join("")}</div>
        <div class="feedback">${esc(q.feedback)}</div>
      `;
      card.querySelectorAll(".opt").forEach(btn => {
        btn.addEventListener("click", () => {
          if (state.answered.has(k)) return;
          const oi = +btn.dataset.oi;
          card.dataset.picked = oi;
          state.answered.add(k);
          if (q.options[oi].correct) state.correct.add(k);
          card.querySelectorAll(".opt").forEach((b, j) => {
            b.disabled = true;
            if (q.options[j].correct) b.classList.add("correct");
            else if (j === oi) b.classList.add("wrong");
          });
          card.querySelector(".feedback").classList.add("show");
          updateProgress();
        });
      });
      container.appendChild(card);
    }

    function render() {
      const sec = SECTIONS[state.sectionIdx];
      const qs = sec.questions;
      const area = document.getElementById("quizArea");
      const pager = document.getElementById("pager");
      area.innerHTML = "";
      area.className = state.mode === "all" ? "all-view" : "";

      if (!qs.length) {
        area.innerHTML = "<p class='stats'>Немає питань у цьому розділі.</p>";
        pager.style.display = "none";
        return;
      }

      if (state.mode === "all") {
        pager.style.display = "none";
        area.innerHTML = `<div class="q-meta"><span>${esc(sec.timecode)}</span> · ${esc(sec.label)} · ${qs.length} питань</div>`;
        const wrap = document.createElement("div");
        qs.forEach((q, qi) => renderQuestionCard(q, state.sectionIdx, qi, wrap));
        area.appendChild(wrap);
      } else {
        pager.style.display = "flex";
        state.qIdx = Math.min(state.qIdx, qs.length - 1);
        area.innerHTML = `<div class="q-meta"><span>${esc(sec.timecode)}</span> · ${esc(sec.label)} · питання ${state.qIdx + 1} / ${qs.length}</div>`;
        const wrap = document.createElement("div");
        renderQuestionCard(qs[state.qIdx], state.sectionIdx, state.qIdx, wrap);
        area.appendChild(wrap);
        document.getElementById("pagerText").textContent = `${state.qIdx + 1} / ${qs.length}`;
        document.getElementById("btnPrev").disabled = state.qIdx === 0;
        document.getElementById("btnNext").disabled = state.qIdx >= qs.length - 1;
      }
      updateProgress();
    }

    document.getElementById("btnPrev").addEventListener("click", () => {
      if (state.qIdx > 0) { state.qIdx--; render(); }
    });
    document.getElementById("btnNext").addEventListener("click", () => {
      const qs = currentQuestions();
      if (state.qIdx < qs.length - 1) { state.qIdx++; render(); }
    });
    document.getElementById("btnModeOne").addEventListener("click", () => {
      state.mode = "one";
      document.getElementById("btnModeOne").classList.add("active");
      document.getElementById("btnModeAll").classList.remove("active");
      render();
    });
    document.getElementById("btnModeAll").addEventListener("click", () => {
      state.mode = "all";
      document.getElementById("btnModeAll").classList.add("active");
      document.getElementById("btnModeOne").classList.remove("active");
      render();
    });

    buildSidebar();
    render();
  </script>
</body>
